<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Semantic RSVP Reader</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
  </head>
  <body>
    <main class="app-shell">
      <section id="input-mode" class="input-mode" aria-labelledby="app-title">
        <header class="app-header">
          <p class="eyebrow">Week 3 prototype</p>
          <h1 id="app-title">Semantic RSVP Reader</h1>
        </header>

        <form id="schedule-form" class="schedule-form">
          <label for="text-input">Paste text</label>
          <textarea id="text-input" name="text" rows="8" placeholder="Paste a paragraph to prepare for RSVP playback."></textarea>
          <button id="prepare-button" type="submit">Prepare</button>
        </form>

        <p id="status-message" class="status-message" aria-live="polite">Prepare text to start reading.</p>
      </section>

      <section id="reader-mode" class="reader-mode is-hidden" aria-label="Reader playback">
        <div id="reader-area" class="reader-area" tabindex="0">
          <p id="chunk-display" class="chunk-display">Ready</p>
        </div>

        <div class="reader-footer">
          <div id="speed-overlay" class="speed-overlay is-hidden" role="dialog" aria-modal="false" aria-labelledby="speed-overlay-title">
            <div class="speed-overlay-header">
              <p id="speed-overlay-title" class="speed-overlay-title">Playback speed</p>
              <button id="speed-close" class="speed-close" type="button" aria-label="Close speed overlay">Close</button>
            </div>
            <p id="speed-label" class="speed-label">1.00x</p>
            <div class="speed-controls" aria-label="Speed controls">
              <button id="speed-slower" type="button">Slower</button>
              <button id="speed-reset" type="button">Reset</button>
              <button id="speed-faster" type="button">Faster</button>
            </div>
            <div class="adaptation-controls" aria-label="Adaptation controls">
              <p class="adaptation-copy">Adaptation: <span id="adaptation-status">On</span></p>
              <button id="adaptation-toggle" type="button" aria-pressed="true">Disable adaptation</button>
              <button id="adaptation-reset" type="button">Reset adaptation</button>
            </div>
          </div>

          <p id="progress-indicator" class="progress-indicator">0 / 0</p>
          <div class="reader-controls compact-controls" aria-label="Reader controls">
            <button id="previous-button" type="button" aria-label="Previous chunk">Prev</button>
            <button id="play-pause-button" type="button">Play</button>
            <button id="next-button" type="button" aria-label="Next chunk">Next</button>
            <button id="reset-button" type="button">Reset</button>
            <button id="back-button" type="button">Edit</button>
          </div>
          <details id="session-debug" class="session-debug">
            <summary>Debug</summary>
            <dl class="session-debug-grid">
              <div>
                <dt>Events</dt>
                <dd id="session-event-count">0</dd>
              </div>
              <div>
                <dt>Rewinds</dt>
                <dd id="session-rewind-count">0</dd>
              </div>
              <div>
                <dt>Pauses</dt>
                <dd id="session-pause-count">0</dd>
              </div>
              <div>
                <dt>Speed changes</dt>
                <dd id="session-speed-change-count">0</dd>
              </div>
              <div>
                <dt>Completed</dt>
                <dd id="session-completed">No</dd>
              </div>
              <div>
                <dt>Adaptations</dt>
                <dd id="adaptation-count">0</dd>
              </div>
              <div>
                <dt>Current speed</dt>
                <dd id="session-current-speed">1.00x</dd>
              </div>
              <div>
                <dt>Adaptation</dt>
                <dd id="session-adaptation-enabled">On</dd>
              </div>
            </dl>
          </details>
        </div>
      </section>
    </main>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  </body>
</html>
