name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-core.txt
      - run: pip install -r requirements-core.txt
      - name: Validate repository evidence
        run: |
          python scripts/validate_repository_integrity.py
          python scripts/archive_slice_docs.py --check
          python scripts/check_markdown_links.py
          python scripts/validate_chunking_corpus.py
          python scripts/freeze_chunking_baseline.py --check
          python -m pytest tests/test_repository_integrity.py
      - if: always()
        run: echo "### Integrity job — ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"

  core:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-core.txt
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: pip install -r requirements-core.txt
      - run: python -m pip check
      - name: Validate dependency-light mode
        run: |
          python -m pytest --ignore=tests/test_parser_assisted_spacy_integration.py --ignore=tests/test_standard_profile_api.py
          python scripts/characterize_s031_playback_adaptation.py --check
          python scripts/characterize_s032_navigation_interaction.py --check
          python scripts/check_js_syntax.py
      - name: Smoke-test rule-based Flask mode
        env:
          RSVP_CHUNKER_MODE: rule_based
        run: python scripts/smoke_test_app.py
      - if: always()
        run: echo "### Core job — ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"
