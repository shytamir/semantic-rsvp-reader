name: Parser CI

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/parser.yml"
      - "scripts/run_s024_comparison.py"
      - "scripts/characterize_s037_evaluation_anomalies.py"
      - "scripts/chunking_experiment_common.py"
      - "semantic_rsvp/**"
      - "tests/test_s024_comparison.py"
      - "tests/test_s037_evaluation_anomaly_characterization.py"
      - "tests/test_parser_assisted_spacy_integration.py"
      - "tests/test_parser_integration_freeze.py"
      - "tests/test_chunker_selection.py"
      - "tests/test_web_chunking_integration.py"
      - "tests/test_standard_profile_api.py"
      - "scripts/smoke_test_app.py"
      - "requirements*.txt"
      - "evaluation/evaluation_anomaly_policy/**"
      - "evaluation/parser_assisted_chunking/**"
  pull_request:
    paths:
      - ".github/workflows/parser.yml"
      - "scripts/run_s024_comparison.py"
      - "scripts/characterize_s037_evaluation_anomalies.py"
      - "scripts/chunking_experiment_common.py"
      - "semantic_rsvp/**"
      - "tests/test_s024_comparison.py"
      - "tests/test_s037_evaluation_anomaly_characterization.py"
      - "tests/test_parser_assisted_spacy_integration.py"
      - "tests/test_parser_integration_freeze.py"
      - "tests/test_chunker_selection.py"
      - "tests/test_web_chunking_integration.py"
      - "tests/test_standard_profile_api.py"
      - "scripts/smoke_test_app.py"
      - "requirements*.txt"
      - "evaluation/evaluation_anomaly_policy/**"
      - "evaluation/parser_assisted_chunking/**"

permissions:
  contents: read

concurrency:
  group: parser-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  parser:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-core.txt
            requirements-nlp-spike.txt
      - run: python -m pip install -r requirements.txt
      - run: python -m pip check
      - name: Verify pinned parser dependencies
        run: python -c "import importlib.metadata as m; assert m.version('Flask') == '3.1.3'; assert m.version('pytest') == '9.1.1'; assert m.version('spacy') == '3.7.5'; assert m.version('en-core-web-sm') == '3.7.1'; assert m.version('Click') == '8.1.8'"
      - name: Validate parser integration and frozen parity
        run: |
          python -m pytest tests/test_parser_assisted_spacy_integration.py tests/test_parser_integration_freeze.py tests/test_chunker_selection.py tests/test_web_chunking_integration.py tests/test_standard_profile_api.py tests/test_s024_comparison.py tests/test_s037_evaluation_anomaly_characterization.py
          python scripts/characterize_s030_semantic_integrity.py --check
          python scripts/characterize_s037_evaluation_anomalies.py --check
      - name: Smoke-test parser-default Flask mode
        run: python scripts/smoke_test_app.py
      - if: always()
        run: echo "### Parser job — ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"
