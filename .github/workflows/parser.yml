name: Parser CI

on:
  push:
    paths:
      - ".github/workflows/parser.yml"
      - "semantic_rsvp/**"
      - "tests/test_parser_assisted_spacy_integration.py"
      - "tests/test_parser_integration_freeze.py"
      - "tests/test_chunker_selection.py"
      - "tests/test_web_chunking_integration.py"
      - "scripts/smoke_test_app.py"
      - "requirements*.txt"
      - "evaluation/parser_assisted_chunking/**"
  pull_request:
    paths:
      - ".github/workflows/parser.yml"
      - "semantic_rsvp/**"
      - "tests/test_parser_assisted_spacy_integration.py"
      - "tests/test_parser_integration_freeze.py"
      - "tests/test_chunker_selection.py"
      - "tests/test_web_chunking_integration.py"
      - "scripts/smoke_test_app.py"
      - "requirements*.txt"
      - "evaluation/parser_assisted_chunking/**"

permissions:
  contents: read

concurrency:
  group: parser-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  parser:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-core.txt
            requirements-nlp-spike.txt
      - run: pip install -r requirements.txt
      - name: Verify pinned parser dependencies
        run: python -c "import importlib.metadata as m; assert m.version('spacy') == '3.7.5'; assert m.version('en-core-web-sm') == '3.7.1'"
      - name: Validate parser integration and frozen parity
        run: python -m pytest tests/test_parser_assisted_spacy_integration.py tests/test_parser_integration_freeze.py tests/test_chunker_selection.py tests/test_web_chunking_integration.py
      - name: Smoke-test parser-default Flask mode
        run: python scripts/smoke_test_app.py
      - if: always()
        run: echo "### Parser job — ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"
